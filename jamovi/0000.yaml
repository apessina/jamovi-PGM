---
title: Practical Growth Modeling
name: PGM
version: 0.5.0
jms: '1.0'
authors:
  - André L. R. Pessina
  - Manoel Garcia Neto
maintainer: André L. R. Pessina <andre.pessina@unesp.br>
date: '2025-12-19'
type: R
description: >-
  This package facilitates biological growth modeling through curve fitting, 
  graphical analysis, calculation of fit quality and key growth parameters.
analyses:
  - title: Growth Curve Modeling
    name: scurve
    ns: PGM
    menuGroup: Growth
    menuTitle: Curve Modeling
    menuSubtitle: Single Curve
    category: analyses
  - title: Growth Curve Comparison
    name: mcurve
    ns: PGM
    menuGroup: Growth
    menuTitle: Curve Comparison
    menuSubtitle: Multiple Curves
    category: analyses
datasets:
  - name: Plant Growth (Gregorczyk, 1998)
    path: gregorczyk1998.csv
    description: >-
      Experimental values of dry matter accumulation (grams per day) in
      buckwheat plants during vegetation
      (https://doi.org/10.1111/j.1439-037X.1998.tb00424.x)
  - name: Chicken Growth (Aggrey, 2002)
    path: aggrey2002.csv
    description: >-
      Mean of body weight measurements (grams per day) from an unselected 
      Athens-Canadian randombred chicken population at different ages
      (https://doi.org/10.1093/ps/81.12.1782)
  - name: Broiler Growth (Freitas et al., 1984)
    path: freitasetal1984.csv
    description: >-
      Experimental mean values of body weight measurements (grams per day) in 
      Pilch broiler chickens from birth to 68 days
      (https://doi.org/10.1590/S1678-3921.pab1984.v19.16029)
  - name: Avian Growth (Svagelj et al., 2019)
    path: svageljetal2019.csv
    description: >-
      Measurements of body mass (g/day), bill, head, and tarsus length in female
      Imperial Shag chicks from hatching to approximately 40 days
      (https://doi.org/10.1111/jav.01864)
  - name: Leaf Growth (Peng et al., 2023)
    path: pengetal2023.csv
    description: >-
      Measurements of leaf length and width in 61 leaves of Camptotheca 
      acuminata Decne at 21 time-points during leaf expansion
      (https://doi.org/10.1016/j.ecolmodel.2023.110531)
usesNative: true
minApp: 1.0.8

...
